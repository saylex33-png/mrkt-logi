<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку для входа через Telegram</p>
        
        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти в MRKT
        </button>
        
        <div id="status">Нажмите кнопку для входа</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function randomString(length = 10) {
            return Math.random().toString(36).substring(2, 2 + length);
        }

        function generateChallenge() {
            return randomString(15) + randomString(15) + randomString(15);
        }

        async function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Получение qtoken...';

            const state = randomString(12) + randomString(12);
            const challenge = generateChallenge();

            const params = {
                client_id: '8156315866',
                origin: 'https://www.mrkt.land',
                return_to: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                state: state,
                scope: 'openid profile',
                state: state,
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                code_challenge: challenge,
                code_challenge_method: 'S256',
                response_type: 'code'
            };

            try {
                // ============================================================
                // ШАГ 1: Получаем qtoken через POST /auth/request
                // ============================================================
                const requestUrl = 'https://oauth.telegram.org/auth/request?' + new URLSearchParams(params).toString();
                
                console.log('📡 Шаг 1: Получение qtoken...');
                
                const requestResponse = await fetch(requestUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include'
                });

                const requestData = await requestResponse.text();
                console.log('📡 Ответ /auth/request:', requestData);

                // qtoken приходит как plain text
                const qtoken = requestData.replace(/["']/g, '');
                console.log('✅ qtoken получен:', qtoken);

                if (!qtoken || qtoken.length < 10) {
                    throw new Error('Не удалось получить qtoken');
                }

                status.textContent = '⏳ Отправка запроса на авторизацию...';

                // ============================================================
                // ШАГ 2: Отправляем POST /auth/login с qtoken
                // ============================================================
                const loginUrl = 'https://oauth.telegram.org/auth/login?' + new URLSearchParams({
                    ...params,
                    qtoken: qtoken
                }).toString();

                console.log('📡 Шаг 2: Отправка qtoken...');

                const loginResponse = await fetch(loginUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include'
                });

                const loginData = await loginResponse.json();
                console.log('📡 Ответ /auth/login:', loginData);

                if (loginData.status === 'waiting') {
                    status.textContent = '✅ Ожидаем подтверждение в Telegram...';
                    
                    // ============================================================
                    // ШАГ 3: Ждём подтверждения
                    // ============================================================
                    await waitForConfirmation(state, challenge, status);
                    
                } else if (loginData.status === 'confirmed') {
                    status.textContent = '✅ Вход выполнен! Перенаправление...';
                    window.location.href = 'https://www.mrkt.land';
                } else {
                    status.textContent = '⚠️ Ошибка: ' + (loginData.error || 'Неизвестная ошибка');
                    btn.disabled = false;
                    btn.textContent = 'Войти в MRKT';
                }

            } catch (error) {
                console.error('❌ Ошибка:', error);
                status.textContent = '❌ Ошибка: ' + error.message;
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
            }
        }

        async function waitForConfirmation(state, challenge, statusElement) {
            const params = {
                client_id: '8156315866',
                origin: 'https://www.mrkt.land',
                return_to: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                state: state,
                scope: 'openid profile',
                state: state,
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                code_challenge: challenge,
                code_challenge_method: 'S256',
                response_type: 'code'
            };

            const checkUrl = 'https://oauth.telegram.org/auth/login?' + new URLSearchParams(params).toString();

            let attempts = 0;
            const maxAttempts = 30;

            return new Promise((resolve) => {
                const interval = setInterval(async () => {
                    attempts++;
                    
                    if (attempts > maxAttempts) {
                        clearInterval(interval);
                        statusElement.textContent = '⏰ Время ожидания истекло. Попробуйте снова.';
                        document.getElementById('loginBtn').disabled = false;
                        document.getElementById('loginBtn').textContent = 'Войти в MRKT';
                        resolve();
                        return;
                    }

                    try {
                        const response = await fetch(checkUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                                'X-Requested-With': 'XMLHttpRequest'
                            },
                            credentials: 'include'
                        });

                        const data = await response.json();
                        console.log('📡 Проверка статуса:', data);

                        if (data.status === 'confirmed') {
                            clearInterval(interval);
                            statusElement.textContent = '✅ Вход выполнен! Перенаправление...';
                            window.location.href = 'https://www.mrkt.land';
                            resolve();
                        } else if (data.status === 'consumed') {
                            clearInterval(interval);
                            statusElement.textContent = '⏳ Код уже использован. Повторная проверка...';
                        } else {
                            statusElement.textContent = '⏳ Ожидаем подтверждение в Telegram... (' + attempts + '/' + maxAttempts + ')';
                        }
                    } catch (error) {
                        console.warn('⚠️ Ошибка проверки:', error);
                    }
                }, 2000);
            });
        }
    </script>
</body>
</html>
