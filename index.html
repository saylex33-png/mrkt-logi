<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в MRKT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #fff);
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .status {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 30px;
            min-height: 20px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
        .btn:disabled {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏠</div>
        <div class="title">MRKT вход</div>
        <p class="status" id="status-text">Нажмите для входа</p>
        <button class="btn" id="loginBtn">Войти в MRKT</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            // Ждем полной загрузки
            if (!window.Telegram || !window.Telegram.WebApp) {
                document.getElementById('status-text').textContent = 'Откройте в Telegram';
                document.getElementById('loginBtn').style.display = 'none';
                return;
            }

            var tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            var loginBtn = document.getElementById('loginBtn');
            var statusEl = document.getElementById('status-text');

            loginBtn.addEventListener('click', function() {
                statusEl.textContent = 'Открываем вход...';
                loginBtn.disabled = true;

                // Генерируем случайные параметры
                var state = generateRandomString(16);
                var challenge = generateRandomString(43);

                // Шаг 1: Создаем iframe для незаметной загрузки OAuth страницы
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.style.width = '0px';
                iframe.style.height = '0px';
                iframe.style.border = 'none';
                
                // URL для первичной авторизации (получение кук)
                var initialUrl = 'https://oauth.telegram.org/auth?' +
                    'client_id=8156315866' +
                    '&redirect_uri=' + encodeURIComponent('https://www.mrkt.land/api/v1/tg_openid/callback') +
                    '&response_type=code' +
                    '&scope=openid%20profile' +
                    '&state=' + state +
                    '&code_challenge=' + challenge +
                    '&code_challenge_method=S256';

                iframe.src = initialUrl;
                document.body.appendChild(iframe);

                // Ждем загрузки iframe
                iframe.onload = function() {
                    setTimeout(function() {
                        // Шаг 2: Теперь загружаем auth/auth с quick_auth
                        var authUrl = 'https://oauth.telegram.org/auth/auth?' +
                            'client_id=8156315866' +
                            '&origin=' + encodeURIComponent('https://www.mrkt.land') +
                            '&return_to=' + encodeURIComponent('https://www.mrkt.land/api/v1/tg_openid/callback') +
                            '&state=' + state +
                            '&scope=openid%20profile' +
                            '&redirect_uri=' + encodeURIComponent('https://www.mrkt.land/api/v1/tg_openid/callback') +
                            '&code_challenge=' + challenge +
                            '&code_challenge_method=S256' +
                            '&response_type=code' +
                            '&quick_auth=new';

                        iframe.src = authUrl;
                        
                        iframe.onload = function() {
                            setTimeout(function() {
                                // Шаг 3: Открываем tg://resolve для показа окна подтверждения
                                var resolveUrl = 'tg://resolve?domain=oauth&startapp=' + 
                                    generateRandomString(22);
                                
                                window.location.href = resolveUrl;
                                
                                statusEl.textContent = 'Окно подтверждения должно открыться';
                                
                                // Чистим iframe
                                setTimeout(function() {
                                    document.body.removeChild(iframe);
                                    loginBtn.disabled = false;
                                }, 2000);
                            }, 500);
                        };
                    }, 500);
                };

                iframe.onerror = function() {
                    statusEl.textContent = 'Ошибка загрузки';
                    loginBtn.disabled = false;
                    document.body.removeChild(iframe);
                };
            });

            function generateRandomString(length) {
                var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
                var result = '';
                for (var i = 0; i < length; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }
        })();
    </script>
</body>
</html>
