<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        .logo { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
            word-break: break-word;
        }
        .info {
            margin-top: 12px;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            border-radius: 8px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🖥️</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку, чтобы войти <br>на <strong>мой ПК</strong></p>

        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти на ПК
        </button>

        <div id="status">Нажмите кнопку для входа</div>
        <div class="info" id="info">📡 Сервер: проверка соединения...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================================
        // ⚡ ТВОЙ ПУБЛИЧНЫЙ АДРЕС (из ngrok)
        // ============================================================
        const SERVER_URL = 'https://cardigan-demise-overbite.ngrok-free.dev';

        // ============================================================
        // ПОЛУЧАЕМ ДАННЫЕ ПОЛЬЗОВАТЕЛЯ
        // ============================================================
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || '';
        const username = user.username || '';

        console.log('👤 Пользователь:', { userId, username });

        // ============================================================
        // ПРОВЕРКА СОЕДИНЕНИЯ
        // ============================================================
        async function checkConnection() {
            const info = document.getElementById('info');
            try {
                const response = await fetch(SERVER_URL + '/ping');
                if (response.ok) {
                    info.textContent = '✅ Сервер доступен';
                } else {
                    info.textContent = '⚠️ Сервер недоступен';
                }
            } catch (e) {
                info.textContent = '❌ Сервер недоступен. Убедись, что ngrok запущен!';
            }
        }
        checkConnection();

        // ============================================================
        // ОСНОВНАЯ ФУНКЦИЯ
        // ============================================================
        async function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Отправка запроса на ПК...';

            try {
                const response = await fetch(SERVER_URL + '/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        username: username || 'Пользователь'
                    })
                });

                const data = await response.json();
                console.log('📡 Ответ сервера:', data);

                if (data.status === 'sent') {
                    status.textContent = '✅ Запрос отправлен! Подтвердите вход в Telegram на телефоне.';
                    await waitForConfirmation(data.state, status);
                } else if (data.status === 'confirmed') {
                    status.textContent = '✅ Вход выполнен!';
                    window.location.href = 'https://www.mrkt.land';
                } else {
                    status.textContent = '⚠️ Ошибка: ' + (data.error || 'Неизвестная ошибка');
                }

            } catch (error) {
                console.error('❌ Ошибка:', error);
                status.textContent = '❌ Ошибка соединения с ПК-сервером. Убедитесь, что ngrok запущен!';
            }

            btn.disabled = false;
            btn.textContent = 'Войти на ПК';
        }

        async function waitForConfirmation(state, statusElement) {
            let attempts = 0;
            const maxAttempts = 30;

            return new Promise((resolve) => {
                const interval = setInterval(async () => {
                    attempts++;

                    if (attempts > maxAttempts) {
                        clearInterval(interval);
                        statusElement.textContent = '⏰ Время ожидания истекло. Попробуйте снова.';
                        resolve();
                        return;
                    }

                    try {
                        const response = await fetch(SERVER_URL + '/check', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ state: state })
                        });

                        const data = await response.json();
                        console.log('📡 Проверка статуса:', data);

                        if (data.status === 'confirmed') {
                            clearInterval(interval);
                            statusElement.textContent = '✅ Вход выполнен!';
                            resolve();
                        } else {
                            statusElement.textContent = '⏳ Ожидаем подтверждение на телефоне... (' + attempts + '/' + maxAttempts + ')';
                        }
                    } catch (error) {
                        console.warn('⚠️ Ошибка проверки:', error);
                    }
                }, 2000);
            });
        }
    </script>
</body>
</html>
