<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        #telegram-login {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
        }
        
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку для входа через Telegram</p>
        
        <!-- ============================================================
        ⚡ TELEGRAM LOGIN WIDGET (работает без браузера!)
        ============================================================ -->
        <div id="telegram-login">
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="asdASDDASadsadSADs_bot"
                data-size="large"
                data-auth-url="https://www.mrkt.land/api/v1/tg_openid/callback"
                data-request-access="write">
            </script>
        </div>
        
        <button class="btn" onclick="manualLogin()" id="manualBtn">
            Или войти вручную
        </button>
        
        <div id="status">Нажмите кнопку для входа</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================================
        // ⚡ ОБРАБОТКА РЕЗУЛЬТАТА ОТ WIDGET
        // ============================================================
        window.onTelegramAuth = function(user) {
            console.log('✅ Пользователь авторизован:', user);
            document.getElementById('status').textContent = '✅ Вход выполнен! Перенаправление...';
            
            // Отправляем данные пользователя на сервер MRKT
            fetch('https://www.mrkt.land/api/v1/tg_openid/callback', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    id: user.id,
                    first_name: user.first_name,
                    last_name: user.last_name,
                    username: user.username,
                    photo_url: user.photo_url,
                    auth_date: user.auth_date,
                    hash: user.hash
                })
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = 'https://www.mrkt.land';
                } else {
                    document.getElementById('status').textContent = '⚠️ Ошибка при входе. Попробуйте снова.';
                }
            })
            .catch(error => {
                console.error('❌ Ошибка:', error);
                document.getElementById('status').textContent = '❌ Ошибка соединения. Попробуйте снова.';
            });
        };

        // ============================================================
        // ⚡ РУЧНОЙ ВХОД (запасной вариант)
        // ============================================================
        function manualLogin() {
            const status = document.getElementById('status');
            const btn = document.getElementById('manualBtn');
            
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Открываем окно авторизации...';

            const state = Math.random().toString(36).substring(2, 15) + 
                         Math.random().toString(36).substring(2, 15);
            const challenge = Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15);

            const params = new URLSearchParams({
                client_id: '8156315866',
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                response_type: 'code',
                scope: 'openid profile',
                state: state,
                code_challenge: challenge,
                code_challenge_method: 'S256'
            });

            const authUrl = 'https://oauth.telegram.org/auth?' + params.toString();
            
            // Открываем через window.open (может открыть браузер)
            window.open(authUrl, '_blank');
            
            status.textContent = '✅ Окно открыто! Подтвердите вход.';
            
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = 'Или войти вручную';
            }, 5000);
        }

        // ============================================================
        // ⚡ ПЕРЕХВАТЫВАЕМ ВОЗВРАТ С CODE И STATE
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            if (code && state) {
                const status = document.getElementById('status');
                status.textContent = '✅ Авторизация успешна! Выполняется вход...';
                
                fetch('https://www.mrkt.land/api/v1/tg_openid/callback?' + new URLSearchParams({
                    code: code,
                    state: state
                }), {
                    method: 'GET',
                    credentials: 'include'
                })
                .then(response => {
                    if (response.ok || response.status === 307 || response.status === 302) {
                        status.textContent = '✅ Вход выполнен! Перенаправление...';
                        window.location.href = 'https://www.mrkt.land';
                    } else {
                        status.textContent = '⚠️ Ошибка при входе. Попробуйте снова.';
                        document.getElementById('manualBtn').disabled = false;
                        document.getElementById('manualBtn').textContent = 'Или войти вручную';
                    }
                })
                .catch(error => {
                    console.error('❌ Ошибка:', error);
                    status.textContent = '❌ Ошибка соединения. Попробуйте снова.';
                    document.getElementById('manualBtn').disabled = false;
                    document.getElementById('manualBtn').textContent = 'Или войти вручную';
                });
            }
        });
    </script>
</body>
</html>
