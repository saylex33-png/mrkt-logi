<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 320px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 30px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            opacity: 0.7;
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>MRKT вход</h1>
        <p>Нажмите кнопку для входа через Telegram</p>
        <button class="btn" id="loginBtn" onclick="loginToMRKT()">
            Войти в MRKT
        </button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand(); // Растягиваем на весь экран
                console.log('Telegram WebApp initialized!');
            } else {
                console.warn('Telegram WebApp not available, running in browser.');
            }
        } catch (e) {
            console.error('Error initializing Telegram WebApp:', e);
        }

        // Флаг для блокировки повторных кликов
        let isLoggingIn = false;

        function loginToMRKT() {
            // Защита от повторных нажатий
            if (isLoggingIn) {
                console.log('Login already in progress.');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            isLoggingIn = true;

            // Генерируем случайный state
            const state = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            
            // Основной URL для авторизации
            const authUrl = 'https://oauth.telegram.org/auth?' +
                'client_id=8156315866' +
                '&redirect_uri=https://www.mrkt.land/api/v1/tg_openid/callback' +
                '&response_type=code' +
                '&scope=openid%20profile' +
                '&state=' + state;

            console.log('Opening auth URL:', authUrl);

            try {
                // Пытаемся открыть через Telegram WebApp (основной способ)
                if (tg && typeof tg.openTelegramLink === 'function') {
                    console.log('Using tg.openTelegramLink');
                    tg.openTelegramLink(authUrl);
                } 
                // Если tg не определен, но мы внутри Telegram (например, старая версия)
                else if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.openTelegramLink === 'function') {
                    console.log('Using window.Telegram.WebApp.openTelegramLink');
                    window.Telegram.WebApp.openTelegramLink(authUrl);
                }
                // Fallback: если мы в обычном браузере
                else {
                    console.log('Using window.open as fallback');
                    window.open(authUrl, '_blank');
                    // В обычном браузере кнопку можно разблокировать сразу
                    btn.disabled = false;
                    btn.textContent = 'Войти в MRKT';
                    isLoggingIn = false;
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('Не удалось открыть окно авторизации. Проверьте консоль для деталей.');
                // Разблокируем кнопку в случае ошибки
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
                isLoggingIn = false;
            }
        }

        // Дополнительная проверка на случай, если кнопка нажата, а WebApp не загружен
        console.log('App ready. Tap the button to login.');
    </script>
</body>
</html>
