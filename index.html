<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 320px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 30px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
        }
        .btn:active {
            opacity: 0.7;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>MRKT вход</h1>
        <p>Нажмите кнопку для входа через Telegram</p>
        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти в MRKT
        </button>
        <div id="status">Нажмите кнопку для входа</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Открываем окно авторизации...';

            // Генерируем уникальный state
            const state = Math.random().toString(36).substring(2, 15) + 
                         Math.random().toString(36).substring(2, 15);

            // Генерируем code_challenge
            const challenge = Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15);

            // ГЛАВНОЕ: используем СХЕМУ tg:// для прямого открытия
            const tgLink = 
                'tg://resolve?' +
                'domain=oauth.telegram.org' +
                '&startauth=' + encodeURIComponent(
                    'client_id=8156315866' +
                    '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                    '&response_type=code' +
                    '&scope=openid%20profile' +
                    '&state=' + state +
                    '&code_challenge=' + challenge +
                    '&code_challenge_method=S256'
                );

            console.log('Opening tg link:', tgLink);

            try {
                // Способ 1: открываем через схему tg:// (работает внутри Telegram!)
                tg.openLink(tgLink);
                status.textContent = '✅ Окно авторизации открыто!';
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
            } catch (e) {
                console.error('tg.openLink failed:', e);
                
                // Способ 2: если не сработало, используем прямую ссылку
                const authUrl = 
                    'https://oauth.telegram.org/auth?' +
                    'client_id=8156315866' +
                    '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                    '&response_type=code' +
                    '&scope=openid%20profile' +
                    '&state=' + state +
                    '&code_challenge=' + challenge +
                    '&code_challenge_method=S256';

                // Открываем через iframe (чтобы не покидать приложение)
                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;border:none;background:var(--tg-theme-bg-color, #0a0a0a);';
                iframe.src = authUrl;
                document.body.appendChild(iframe);
                status.textContent = '✅ Если ничего не открылось, проверьте консоль (F12)';
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
            }
        }
    </script>
</body>
</html>
