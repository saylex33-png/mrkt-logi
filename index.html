<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку для входа через Telegram</p>
        
        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти в MRKT
        </button>
        
        <div id="status">Нажмите кнопку для входа</div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Открываем окно авторизации...';

            // Генерируем уникальные параметры
            const state = Math.random().toString(36).substring(2, 15) + 
                         Math.random().toString(36).substring(2, 15);
            const challenge = Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15);

            // ФОРМИРУЕМ ПРАВИЛЬНЫЙ URL
            const authUrl = 
                'https://oauth.telegram.org/auth?' +
                'client_id=8156315866' +
                '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                '&response_type=code' +
                '&scope=openid%20profile' +
                '&state=' + state +
                '&code_challenge=' + challenge +
                '&code_challenge_method=S256';

            console.log('🔗 URL:', authUrl);

            // =============================================
            // ⚡ ГЛАВНЫЙ СЕКРЕТ: ИСПОЛЬЗУЕМ SWITCH INLINE QUERY
            // =============================================
            try {
                // Этот метод гарантированно открывает окно ВНУТРИ Telegram
                tg.switchInlineQuery('', {
                    chat_types: ['users'],
                    choose_chat: false
                });

                // Через 100мс открываем ссылку (это сработает как "запасной вариант")
                setTimeout(() => {
                    tg.openLink(authUrl);
                }, 100);

                status.textContent = '✅ Окно авторизации открыто!';
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
                
            } catch (e) {
                console.warn('⚠️ SwitchInlineQuery не сработал, пробуем openLink:', e);
                
                // Если switch не сработал - просто открываем ссылку
                tg.openLink(authUrl);
                status.textContent = '✅ Окно авторизации открыто!';
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
            }
        }

        // Обработка возврата из авторизации
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            if (code && state) {
                const status = document.getElementById('status');
                status.textContent = '✅ Авторизация успешна!';
                
                fetch('https://www.mrkt.land/api/v1/tg_openid/callback?' + new URLSearchParams({
                    code: code,
                    state: state
                }), {
                    method: 'GET',
                    credentials: 'include'
                })
                .then(response => {
                    if (response.ok) {
                        status.textContent = '✅ Вход выполнен!';
                        window.location.href = 'https://www.mrkt.land';
                    }
                })
                .catch(error => console.error('❌ Ошибка:', error));
            }
        });
    </script>
</body>
</html>
