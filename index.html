<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в MRKT (прямая авторизация)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 320px;
        }
        .status {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
            min-height: 40px;
        }
        .btn {
            background: #0088cc;
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { opacity: 0.7; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 MRKT вход</h1>
        <p class="status" id="status-text">Готов к авторизации</p>
        <button class="btn" id="loginBtn">Войти в MRKT</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginBtn = document.getElementById('loginBtn');
            var statusEl = document.getElementById('status-text');

            // Проверяем что мы в Telegram
            if (!window.Telegram || !window.Telegram.WebApp) {
                statusEl.textContent = '❌ Открой в Telegram!';
                loginBtn.style.display = 'none';
                return;
            }

            var tg = window.Telegram.WebApp;
            tg.ready();
            
            // Расширяем на весь экран
            tg.expand();

            loginBtn.addEventListener('click', async function() {
                statusEl.textContent = '🔄 Запрашиваем токен...';
                loginBtn.disabled = true;

                try {
                    // Шаг 1: Получаем начальный URL с quick_auth параметром
                    var state = Math.random().toString(36).substring(2, 15) + 
                                Math.random().toString(36).substring(2, 15);
                    
                    var challenge = Math.random().toString(36).substring(2, 15) +
                                  Math.random().toString(36).substring(2, 15) +
                                  Math.random().toString(36).substring(2, 15);

                    // Сначала идем на /auth чтобы получить куки и редирект
                    var initialUrl = 'https://oauth.telegram.org/auth?' +
                        'client_id=8156315866' +
                        '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                        '&response_type=code' +
                        '&scope=openid%20profile' +
                        '&state=' + state +
                        '&code_challenge=' + challenge +
                        '&code_challenge_method=S256';

                    // Фетчим страницу чтобы получить куки
                    var response = await fetch(initialUrl, {
                        credentials: 'include'
                    });
                    
                    statusEl.textContent = '📱 Открываем подтверждение...';

                    // Шаг 2: Переходим на auth/auth с quick_auth=new
                    var authUrl = 'https://oauth.telegram.org/auth/auth?' +
                        'client_id=8156315866' +
                        '&origin=https%3A%2F%2Fwww.mrkt.land' +
                        '&return_to=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                        '&state=' + state +
                        '&scope=openid%20profile' +
                        '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                        '&code_challenge=' + challenge +
                        '&code_challenge_method=S256' +
                        '&response_type=code' +
                        '&quick_auth=new';

                    // Шаг 3: Фетчим auth/auth чтобы получить tg://resolve ссылку
                    var authResponse = await fetch(authUrl, {
                        credentials: 'include'
                    });
                    
                    var html = await authResponse.text();
                    
                    // Парсим HTML чтобы найти tg://resolve ссылку
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var scripts = doc.querySelectorAll('script');
                    
                    var resolveUrl = null;
                    for (var i = 0; i < scripts.length; i++) {
                        var scriptContent = scripts[i].textContent;
                        var match = scriptContent.match(/tg:\/\/resolve\?domain=oauth&startapp=([^'"]+)/);
                        if (match) {
                            resolveUrl = 'tg://resolve?domain=oauth&startapp=' + match[1];
                            break;
                        }
                    }

                    if (resolveUrl) {
                        statusEl.textContent = '✅ Должно появиться окно подтверждения';
                        
                        // Открываем tg://resolve ссылку
                        window.location.href = resolveUrl;
                    } else {
                        throw new Error('Не удалось найти ссылку для входа');
                    }

                } catch (error) {
                    console.error('Ошибка:', error);
                    statusEl.textContent = '❌ Ошибка: ' + error.message;
                    loginBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
