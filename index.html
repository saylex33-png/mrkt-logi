<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в MRKT (без браузера)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 320px;
        }
        .status {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        .btn {
            background: #0088cc;
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 MRKT вход</h1>
        <p class="status" id="status-text">Готов к авторизации</p>
        <button class="btn" id="loginBtn">Войти в MRKT</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginBtn = document.getElementById('loginBtn');
            var statusEl = document.getElementById('status-text');

            // Проверяем, что запущено внутри Telegram
            if (!window.Telegram || !window.Telegram.WebApp) {
                statusEl.textContent = 'Ошибка: открой в Telegram WebApp';
                loginBtn.style.display = 'none';
                return;
            }

            // Инициализируем WebApp
            var tg = window.Telegram.WebApp;
            tg.ready();

            loginBtn.addEventListener('click', function() {
                statusEl.textContent = 'Запрашиваем авторизацию...';
                
                // Генерируем случайные параметры
                var state = Math.random().toString(36).substring(2, 15) + 
                            Math.random().toString(36).substring(2, 15);
                
                var challenge = Math.random().toString(36).substring(2, 15) +
                              Math.random().toString(36).substring(2, 15) +
                              Math.random().toString(36).substring(2, 15);

                // Формируем URL для OAuth (тот самый, с quick_auth)
                var oauthUrl = 'https://oauth.telegram.org/auth/auth?' +
                    'client_id=8156315866' +
                    '&origin=https%3A%2F%2Fwww.mrkt.land' +
                    '&return_to=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                    '&state=' + state +
                    '&scope=openid%20profile' +
                    '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                    '&code_challenge=' + challenge +
                    '&code_challenge_method=S256' +
                    '&response_type=code' +
                    '&quick_auth=new'; // ← вот эта магия!

                // ВАЖНЕЙШИЙ МОМЕНТ: открываем через Mini Apps метод
                // Это НЕ откроет браузер, а покажет окно подтверждения
                tg.openTelegramLink(oauthUrl);
                
                statusEl.textContent = 'Ожидаем подтверждения...';
            });
        });
    </script>
</body>
</html>
