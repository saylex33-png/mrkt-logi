<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Нажмите кнопку для входа через Telegram</p>
        
        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти в MRKT
        </button>
        
        <div id="status">Нажмите кнопку для входа</div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Генерация случайной строки
        function randomString(length = 10) {
            return Math.random().toString(36).substring(2, 2 + length);
        }

        // Генерация code_challenge
        function generateChallenge() {
            return randomString(15) + randomString(15) + randomString(15);
        }

        function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Открываем окно авторизации...';

            // Генерируем уникальные параметры
            const state = randomString(12) + randomString(12);
            const challenge = generateChallenge();

            // =====================================================================
            // ⚡ СЕКРЕТНЫЙ СПОСОБ: ИСПОЛЬЗУЕМ СХЕМУ tg:// ДЛЯ ПРЯМОГО ОТКРЫТИЯ
            // =====================================================================
            
            // Формируем параметры для авторизации
            const params = new URLSearchParams({
                client_id: '8156315866',
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                response_type: 'code',
                scope: 'openid profile',
                state: state,
                code_challenge: challenge,
                code_challenge_method: 'S256'
            });

            // Создаём ссылку для открытия через Telegram
            const tgLink = 'tg://resolve?' + new URLSearchParams({
                domain: 'oauth.telegram.org',
                startauth: params.toString()
            });

            console.log('🔗 Открываем через tg://:', tgLink);

            // Пробуем открыть через Telegram WebApp
            try {
                // Способ 1: через openTelegramLink (работает для tg:// ссылок)
                if (typeof tg.openTelegramLink === 'function') {
                    tg.openTelegramLink(tgLink);
                    status.textContent = '✅ Окно открыто! Подтвердите вход в Telegram';
                    console.log('✅ Открыто через tg.openTelegramLink');
                } 
                // Способ 2: через openLink
                else if (typeof tg.openLink === 'function') {
                    tg.openLink(tgLink);
                    status.textContent = '✅ Окно открыто! Подтвердите вход в Telegram';
                    console.log('✅ Открыто через tg.openLink');
                }
                // Способ 3: запасной вариант
                else {
                    window.location.href = tgLink;
                    status.textContent = '⏳ Переход на страницу авторизации...';
                    console.log('✅ Переход через window.location');
                }
            } catch (e) {
                console.warn('⚠️ Ошибка при открытии через Telegram:', e);
                // Если все способы не сработали - открываем в новой вкладке
                window.open('https://oauth.telegram.org/auth?' + params.toString(), '_blank');
                status.textContent = '✅ Окно открыто в браузере. Подтвердите вход.';
            }

            // Разблокируем кнопку через 5 секунд
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = 'Войти в MRKT';
                if (status.textContent.includes('⏳') || status.textContent.includes('❌')) {
                    status.textContent = 'Нажмите кнопку для входа';
                }
            }, 5000);
        }

        // Обработка возврата после авторизации (если вернулись в приложение)
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            if (code && state) {
                const status = document.getElementById('status');
                status.textContent = '✅ Авторизация успешна! Выполняется вход...';
                
                // Отправляем запрос на сервер MRKT (как в логах)
                fetch('https://www.mrkt.land/api/v1/tg_openid/callback?' + new URLSearchParams({
                    code: code,
                    state: state
                }), {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                })
                .then(response => {
                    if (response.ok || response.status === 307 || response.status === 302) {
                        status.textContent = '✅ Вход выполнен! Перенаправление...';
                        window.location.href = 'https://www.mrkt.land';
                    } else {
                        status.textContent = '⚠️ Ошибка при входе. Попробуйте снова.';
                        document.getElementById('loginBtn').disabled = false;
                        document.getElementById('loginBtn').textContent = 'Войти в MRKT';
                    }
                })
                .catch(error => {
                    console.error('❌ Ошибка:', error);
                    status.textContent = '❌ Ошибка соединения. Попробуйте снова.';
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('loginBtn').textContent = 'Войти в MRKT';
                });
            }
        });

        console.log('🚀 Приложение загружено. Нажмите кнопку для входа.');
    </script>
</body>
</html>
