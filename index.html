<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MRKT вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0a0a0a);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            max-width: 340px;
            width: 100%;
        }
        
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #999);
            font-size: 15px;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #333);
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #fff);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>MRKT вход</h1>
        <p class="subtitle">Введите номер телефона для входа</p>
        
        <div class="input-group">
            <label>Номер телефона</label>
            <input type="tel" id="phoneInput" placeholder="+7 950 476 3275" value="+7">
        </div>
        
        <button class="btn" onclick="loginToMRKT()" id="loginBtn">
            Войти
        </button>
        
        <div id="status">Введите номер и нажмите Войти</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function randomString(length = 10) {
            return Math.random().toString(36).substring(2, 2 + length);
        }

        function generateChallenge() {
            return randomString(15) + randomString(15) + randomString(15);
        }

        // Форматирование номера телефона
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            let value = this.value.replace(/\D/g, '');
            if (value.startsWith('7') || value.startsWith('8')) {
                if (value.startsWith('8')) value = '7' + value.substring(1);
                let formatted = '+7';
                if (value.length > 1) formatted += ' ' + value.substring(1, 4);
                if (value.length > 4) formatted += ' ' + value.substring(4, 7);
                if (value.length > 7) formatted += ' ' + value.substring(7, 9);
                if (value.length > 9) formatted += ' ' + value.substring(9, 11);
                this.value = formatted;
            }
        });

        async function loginToMRKT() {
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('status');
            const phoneInput = document.getElementById('phoneInput');
            
            // Очищаем номер от лишних символов
            const phone = phoneInput.value.replace(/\D/g, '');
            if (phone.length < 10) {
                status.textContent = '⚠️ Введите корректный номер телефона';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.textContent = '⏳ Отправка запроса...';

            const state = randomString(12) + randomString(12);
            const challenge = generateChallenge();

            // ============================================================
            // ⚡ ОТПРАВЛЯЕМ POST-ЗАПРОС С НОМЕРОМ ТЕЛЕФОНА
            // ============================================================
            
            const params = {
                client_id: '8156315866',
                origin: 'https://www.mrkt.land',
                return_to: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                state: state,
                scope: 'openid profile',
                state: state,
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                code_challenge: challenge,
                code_challenge_method: 'S256',
                response_type: 'code'
            };

            const baseUrl = 'https://oauth.telegram.org/auth/request?';
            const queryString = new URLSearchParams(params).toString();
            const requestUrl = baseUrl + queryString;

            console.log('📡 Отправка запроса на:', requestUrl);
            console.log('📱 Номер телефона:', phone);

            try {
                // ============================================================
                // ШАГ 1: Отправляем номер телефона
                // ============================================================
                const response = await fetch(requestUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include',
                    body: new URLSearchParams({
                        phone: phone
                    })
                });

                const data = await response.json();
                console.log('📡 Ответ на /auth/request:', data);

                if (data.status === 'sent') {
                    status.textContent = '✅ Код подтверждения отправлен в Telegram!';
                    
                    // ============================================================
                    // ШАГ 2: Ждём подтверждения
                    // ============================================================
                    await waitForConfirmation(state, challenge, status);
                    
                } else if (data.status === 'confirmed') {
                    status.textContent = '✅ Вход выполнен! Перенаправление...';
                    window.location.href = 'https://www.mrkt.land';
                } else {
                    status.textContent = '⚠️ Ошибка: ' + (data.error || 'Неизвестная ошибка');
                    btn.disabled = false;
                    btn.textContent = 'Войти';
                }
            } catch (error) {
                console.error('❌ Ошибка:', error);
                status.textContent = '❌ Ошибка соединения. Попробуйте снова.';
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        async function waitForConfirmation(state, challenge, statusElement) {
            const params = {
                client_id: '8156315866',
                origin: 'https://www.mrkt.land',
                return_to: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                state: state,
                scope: 'openid profile',
                state: state,
                redirect_uri: 'https://www.mrkt.land/api/v1/tg_openid/callback',
                code_challenge: challenge,
                code_challenge_method: 'S256',
                response_type: 'code'
            };

            const loginUrl = 'https://oauth.telegram.org/auth/login?' + new URLSearchParams(params).toString();

            let attempts = 0;
            const maxAttempts = 30;

            return new Promise((resolve) => {
                const interval = setInterval(async () => {
                    attempts++;
                    
                    if (attempts > maxAttempts) {
                        clearInterval(interval);
                        statusElement.textContent = '⏰ Время ожидания истекло. Попробуйте снова.';
                        document.getElementById('loginBtn').disabled = false;
                        document.getElementById('loginBtn').textContent = 'Войти';
                        resolve();
                        return;
                    }

                    try {
                        const response = await fetch(loginUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                                'X-Requested-With': 'XMLHttpRequest'
                            },
                            credentials: 'include'
                        });

                        const data = await response.json();
                        console.log('📡 Проверка статуса:', data);

                        if (data.status === 'confirmed') {
                            clearInterval(interval);
                            statusElement.textContent = '✅ Вход выполнен! Перенаправление...';
                            
                            // Отправляем финальный запрос на MRKT
                            await fetch('https://www.mrkt.land/api/v1/tg_openid/callback?' + new URLSearchParams({
                                code: data.code || '',
                                state: state
                            }), {
                                method: 'GET',
                                credentials: 'include'
                            });
                            
                            window.location.href = 'https://www.mrkt.land';
                            resolve();
                        } else {
                            statusElement.textContent = '⏳ Ожидаем подтверждение в Telegram...';
                        }
                    } catch (error) {
                        console.warn('⚠️ Ошибка проверки:', error);
                    }
                }, 2000);
            });
        }
    </script>
</body>
</html>
