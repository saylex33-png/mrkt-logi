<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в MRKT</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background: #0088cc;
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
            max-width: 300px;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn:active {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 MRKT вход</h1>
        <p>Нажмите кнопку для входа через Telegram</p>
        <button class="btn" onclick="loginToMRKT()">
            Войти в MRKT
        </button>
    </div>

    <script>
        function loginToMRKT() {
            // Генерируем случайный state
            const state = Math.random().toString(36).substring(2, 15) + 
                          Math.random().toString(36).substring(2, 15);
            
            // Генерируем code_challenge (простой вариант)
            const challenge = Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15) +
                            Math.random().toString(36).substring(2, 15);
            
            // Формируем URL с параметром quick_auth
            const authUrl = 
                'https://oauth.telegram.org/auth/auth?' +
                'client_id=8156315866' +
                '&origin=https%3A%2F%2Fwww.mrkt.land' +
                '&return_to=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                '&state=' + state +
                '&scope=openid%20profile' +
                '&state=' + state +
                '&redirect_uri=https%3A%2F%2Fwww.mrkt.land%2Fapi%2Fv1%2Ftg_openid%2Fcallback' +
                '&code_challenge=' + challenge +
                '&code_challenge_method=S256' +
                '&response_type=code' +
                '&quick_auth=new';  // ← КЛЮЧЕВОЙ ПАРАМЕТР!
            
            // Открываем в новом окне
            window.open(authUrl, '_blank');
        }
    </script>
</body>
</html>
