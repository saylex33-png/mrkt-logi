<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
            max-width: 300px;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>MRKT вход</h1>
        <p>Нажмите кнопку для входа через Telegram</p>
        <button class="btn" onclick="loginToMRKT()">
            Войти в MRKT
        </button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Растягиваем на весь экран

        function loginToMRKT() {
            // Генерируем случайный state
            const state = Math.random().toString(36).substring(2, 15) + 
                          Math.random().toString(36).substring(2, 15);

            // Используем метод openTelegramLink - открывает ТО САМОЕ окно!
            tg.openTelegramLink(
                'https://oauth.telegram.org/auth?' +
                'client_id=8156315866' +
                '&redirect_uri=https://www.mrkt.land/api/v1/tg_openid/callback' +
                '&response_type=code' +
                '&scope=openid%20profile' +
                '&state=' + state
            );
            
            // Альтернативный способ - если openTelegramLink не работает:
            // tg.openLink('https://oauth.telegram.org/auth?...');
        }
    </script>
</body>
</html>
